# Hybrid FaceNet-style model for FaceVerify Campus

model:
  type: hybrid
  backbone: inception_resnet_v1
  embedding_dim: 512
  in_channels: 3
  image_size: 160
  score: cosine_similarity_mapped_0_1

dataset:
  modality: face
  name: hybrid_face

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/hybrid_face
