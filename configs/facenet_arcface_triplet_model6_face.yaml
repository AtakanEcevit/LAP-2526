# FaceNet-style ArcFace Triplet Face Verification for Model 6

model:
  type: facenet_arcface_triplet_model6
  backbone: inception_resnet_v1
  embedding_dim: 512
  in_channels: 3
  image_size: 160
  score: cosine_similarity_mapped_0_1

dataset:
  modality: face
  name: facenet_arcface_triplet_model6_face

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/facenet_arcface_triplet_model6_face
