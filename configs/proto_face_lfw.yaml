# Prototypical Network — Face Verification (LFW + RGB + ResNet-50 + CBAM)
# ArcFace NOT used here: it requires fixed global identity labels, incompatible
# with episode-based training (episode labels reset to 0..n_way-1 each episode).
# Use arcface_pretrain_lfw.yaml first if you want ArcFace backbone pre-training.

model:
  type: prototypical
  backbone: resnet
  architecture: resnet50
  embedding_dim: 512
  pretrained: true
  in_channels: 3
  distance: cosine
  use_attention: true

dataset:
  modality: face
  name: lfw
  root_dir: data/raw/faces/lfw
  color_mode: rgb
  min_images: 5

training:
  epochs: 100
  n_way: 10
  k_shot: 5
  q_query: 10
  lr: 0.0005
  weight_decay: 0.00001
  scheduler: cosine
  warmup_epochs: 5
  patience: 20
  iterations_per_epoch: 300
  temperature: 0.1
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  amp: true
  accumulation_steps: 2
  criterion: prototypical

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/proto_face_lfw_rgb_r50
