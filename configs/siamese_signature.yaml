# Siamese Network — Signature Verification (CEDAR)
# Config for training Siamese on CEDAR dataset
#
# NOTE: CEDAR is a small dataset (55 writers, 1320 genuine + 1320 forgery).
# This limits embedding separation — genuine vs impostor scores are tightly
# clustered (~5-10% gap). A larger signature dataset would significantly
# improve discrimination. Consider BHSig260 or GPDS as alternatives.

model:
  type: siamese
  backbone: resnet          # 'resnet' or 'light'
  embedding_dim: 128
  pretrained: true
  in_channels: 1

dataset:
  modality: signature
  name: cedar
  root_dir: data/raw/signatures/CEDAR

training:
  epochs: 50
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.00001
  loss: cosine               # 'cosine' (recommended), 'contrastive', or 'bce'
  margin: 2.0               # only used if loss=contrastive
  cosine_margin: 0.5        # only used if loss=cosine (negative pairs pushed below this)
  scheduler: step
  lr_step: 15
  lr_gamma: 0.5
  patience: 10
  iterations_per_epoch: 100
  num_workers: 2              # DataLoader workers (0 = sequential)
  prefetch_factor: 2          # batches prefetched per worker
  pin_memory: true            # pinned GPU transfer (auto-disabled on CPU)
  amp: false                  # Mixed-precision training (CUDA only, auto-disabled on CPU/DirectML)
  accumulation_steps: 1       # Gradient accumulation steps (1 = no accumulation)
  tensorboard: false          # Enable TensorBoard logging

evaluation:
  k_shots: [1, 3, 5, 10]

results_dir: results/siamese_signature_cedar
