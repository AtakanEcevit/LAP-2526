# Siamese Network — Signature Verification (CEDAR)
# Config for training Siamese on CEDAR dataset

model:
  type: siamese
  backbone: resnet          # 'resnet' or 'light'
  embedding_dim: 128
  pretrained: true
  in_channels: 1

dataset:
  modality: signature
  name: cedar
  root_dir: data/raw/signatures/CEDAR

training:
  epochs: 50
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.00001
  loss: contrastive         # 'contrastive' or 'bce'
  margin: 1.0
  scheduler: step
  lr_step: 20
  lr_gamma: 0.5
  patience: 15
  iterations_per_epoch: 100

evaluation:
  k_shots: [1, 3, 5, 10]

results_dir: results/siamese_signature_cedar
