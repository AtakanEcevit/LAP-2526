# Siamese Network — Face Verification (Improved v2)
# Changes from v1:
#   - backbone: resnet50 (was resnet18)
#   - embedding_dim: 512 (was 128)
#   - in_channels: 3 RGB (was 1 grayscale)
#   - loss: arcface (was cosine)
#   - dataset: lfw (was att — only 400 images)
#   - augmentation: enabled
#   - amp: true for faster GPU training

model:
  type: siamese
  backbone: resnet50          # resnet50 / efficientnet / light
  embedding_dim: 512          # 512 = standard for face recognition (ArcFace, FaceNet)
  pretrained: true
  in_channels: 3              # RGB — better for face verification

dataset:
  modality: face
  name: lfw                   # LFW: 13,000+ images, 5749 identities (vs AT&T: 400 images)
  root_dir: data/raw/faces/lfw
  image_size: 112             # Standard face input size for ArcFace
  augmentation:
    enabled: true
    horizontal_flip: 0.5      # Random horizontal flip
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.2
    random_grayscale: 0.1     # Occasional grayscale for robustness
    random_rotation: 10       # ±10 degree rotation
    random_erasing: 0.2       # Occlusion simulation

training:
  epochs: 100                 # More epochs for larger dataset
  batch_size: 64              # Larger batch for stable ArcFace gradients
  lr: 0.0001
  weight_decay: 0.00005
  loss: arcface               # arcface / cosine / combined / contrastive
  arcface_s: 64.0             # ArcFace scale
  arcface_m: 0.5              # ArcFace margin (28.6°)
  scheduler: cosine           # Cosine annealing (better than step decay)
  warmup_epochs: 5            # Linear warmup for first 5 epochs
  patience: 15
  iterations_per_epoch: 200
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
  amp: true                   # Mixed precision — 2x faster on GPU
  accumulation_steps: 2       # Effective batch size = 64 * 2 = 128

evaluation:
  k_shots: [1, 3, 5]
  metrics: [eer, auc, far, frr, accuracy]

results_dir: results/siamese_face_lfw_v2
