# Siamese Network — Face Verification (AT&T/ORL)

model:
  type: siamese
  backbone: resnet
  embedding_dim: 128
  pretrained: true
  in_channels: 1

dataset:
  modality: face
  name: att
  root_dir: data/raw/faces/att_faces

training:
  epochs: 50
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.00001
  loss: bce                 # 'bce' (recommended) or 'contrastive'
  margin: 2.0               # only used if loss=contrastive
  scheduler: step
  lr_step: 15
  lr_gamma: 0.5
  patience: 10
  iterations_per_epoch: 100
  num_workers: 2              # DataLoader workers (0 = sequential)
  prefetch_factor: 2          # batches prefetched per worker
  pin_memory: true            # pinned GPU transfer (auto-disabled on CPU)

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/siamese_face_att
