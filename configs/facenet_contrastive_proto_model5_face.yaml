# FaceNet-style Contrastive Prototypical Face Verification alias for Model 5

model:
  type: facenet_contrastive_proto_model5
  backbone: inception_resnet_v1
  embedding_dim: 512
  in_channels: 3
  image_size: 160
  score: cosine_similarity_mapped_0_1

dataset:
  modality: face
  name: facenet_contrastive_proto_model5_face

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/facenet_contrastive_proto_model5_face
