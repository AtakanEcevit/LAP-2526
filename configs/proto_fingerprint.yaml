# Prototypical Network — Fingerprint Verification (SOCOFing)

model:
  type: prototypical
  backbone: resnet
  embedding_dim: 128
  pretrained: true
  in_channels: 1
  distance: cosine          # 'cosine' (recommended with L2-norm) or 'euclidean'

dataset:
  modality: fingerprint
  name: socofing
  root_dir: data/raw/fingerprints/SOCOFing

training:
  epochs: 50
  n_way: 5
  k_shot: 3
  q_query: 3
  lr: 0.0001
  weight_decay: 0.00001
  scheduler: step
  lr_step: 15
  lr_gamma: 0.5
  patience: 10
  iterations_per_epoch: 100
  num_workers: 2              # DataLoader workers (0 = sequential)
  prefetch_factor: 2          # batches prefetched per worker
  pin_memory: true            # pinned GPU transfer (auto-disabled on CPU)

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/proto_fingerprint_socofing
