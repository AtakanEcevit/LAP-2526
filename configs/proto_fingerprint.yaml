# Prototypical Network — Fingerprint Verification (SOCOFing)

model:
  type: prototypical
  backbone: resnet
  embedding_dim: 128
  pretrained: true
  in_channels: 1
  distance: cosine          # 'cosine' (recommended with L2-norm) or 'euclidean'

dataset:
  modality: fingerprint
  name: socofing
  root_dir: data/raw/fingerprints/SOCOFing

training:
  epochs: 10
  n_way: 5
  k_shot: 5
  q_query: 5
  lr: 0.0001
  weight_decay: 0.00001
  scheduler: step
  lr_step: 20
  lr_gamma: 0.5
  patience: 15
  iterations_per_epoch: 100

evaluation:
  k_shots: [1, 3, 5, 10]

results_dir: results/proto_fingerprint_socofing
