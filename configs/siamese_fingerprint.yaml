# Siamese Network — Fingerprint Verification (SOCOFing)

model:
  type: siamese
  backbone: resnet
  embedding_dim: 128
  pretrained: true
  in_channels: 1

dataset:
  modality: fingerprint
  name: socofing
  root_dir: data/raw/fingerprints/SOCOFing

training:
  epochs: 150
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.00001
  loss: cosine               # 'cosine' (recommended), 'contrastive', or 'bce'
  margin: 2.0               # only used if loss=contrastive
  cosine_margin: -0.5       # CosineEmbeddingLoss: negatives pushed below this in [-1,1] → 0.25 in [0,1]
  scheduler: step
  lr_step: 30
  lr_gamma: 0.5
  patience: 40
  iterations_per_epoch: 300
  hard_negative_mining: true  # online semi-hard negative mining for cosine loss
  num_workers: 2              # DataLoader workers (0 = sequential)
  prefetch_factor: 2          # batches prefetched per worker
  pin_memory: true            # pinned GPU transfer (auto-disabled on CPU)
  amp: false                  # Mixed-precision training (CUDA only, auto-disabled on CPU/DirectML)
  accumulation_steps: 1       # Gradient accumulation steps (1 = no accumulation)
  tensorboard: false          # Enable TensorBoard logging

evaluation:
  k_shots: [1, 3, 5]

results_dir: results/siamese_fingerprint_socofing
